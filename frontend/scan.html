<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Scan</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scan-container">

        <h1>Scanning Your Mood...</h1>

        <div class="face-scan">

    <video id="webcam" autoplay playsinline></video>

    <canvas id="canvas" style="display:none;"></canvas>

    <div class="scan-line"></div>

</div>

        <p id="scan-status">
            Initializing Camera...
        </p>

        <h2 id="progress-text">
            0%
        </h2>

    </div>

<script>

const webcam = document.getElementById("webcam");
const canvas = document.getElementById("canvas");

const progressText = document.getElementById("progress-text");
const scanStatus = document.getElementById("scan-status");

async function startCamera(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video:true
        });

        webcam.srcObject = stream;

        scanStatus.innerHTML = "Scanning Facial Expressions...";

        setTimeout(captureAndAnalyze, 5000);

    }

    catch(error){

        scanStatus.innerHTML = "Camera access denied";
        console.error(error);

    }

}

async function captureAndAnalyze(){

    progressText.innerHTML = "80%";
    scanStatus.innerHTML = "Analyzing Emotions...";

    canvas.width = webcam.videoWidth;
    canvas.height = webcam.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(
        webcam,
        0,
        0,
        canvas.width,
        canvas.height
    );

    const image = canvas.toDataURL("image/jpeg");

    const response = await fetch(
        "https://moodmirror-backend-dxp5.onrender.com/analyze",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                image:image
            })
        }
    );

    const result = await response.json();

    localStorage.setItem("happy", result.happy);
    localStorage.setItem("neutral", result.neutral);
    localStorage.setItem("sad", result.sad);

    progressText.innerHTML = "100%";
    scanStatus.innerHTML = "Scan Complete";

    setTimeout(() => {

        window.location.href = "result.html";

    }, 1000);

}

startCamera();

</script>

</body>
</html>
