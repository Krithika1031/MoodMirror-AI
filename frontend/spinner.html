<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Celebration Spinner</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="spinner-page">

    <!-- TITLE -->

    <h1 class="spinner-title">

        🎡 Celebration Spinner

    </h1>

    <!-- SUBTITLE -->

    <p class="spinner-subtitle">

        Spin the wheel and unlock a fun happy challenge ✨

    </p>

    <!-- MAIN CARD -->

    <div class="spinner-card">

        <div class="spinner-icon">
            🎉
        </div>

        <h2>

            Ready to celebrate your mood?

        </h2>

        <p>

            Click below and let the wheel decide your happy challenge 😭🔥

        </p>

        <!-- BUTTON -->

        <a href="https://toytheater.com/spinner/"
           target="_blank"
           class="open-spinner-btn">

           Click Here & Spin 🎡

        </a>

    </div>

    <!-- BACK BUTTON -->

    <a href="happy.html"
       class="back-button">

       ← Back

    </a>

</div>

</body>
</html>
